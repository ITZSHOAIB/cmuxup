[core]
    pager = delta

[interactive]
    diffFilter = delta --color-only

[delta]
    navigate = true
    dark = true
    side-by-side = true
    line-numbers = true
    hyperlinks = true
    syntax-theme = {{DELTA_THEME}}
    file-style = bold yellow ul
    file-decoration-style = none
    hunk-header-decoration-style = cyan box ul
    line-numbers-left-format = {nm:>4}┊
    line-numbers-right-format = {np:>4}│
    minus-style = syntax #45292f
    minus-emph-style = syntax #6e3a3f
    plus-style = syntax #28332a
    plus-emph-style = syntax #3b513d

[merge]
    conflictstyle = zdiff3

[diff]
    colorMoved = default
