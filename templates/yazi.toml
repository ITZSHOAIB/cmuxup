# yazi file manager config — managed by cmuxup
[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 1000
max_height = 1000

[opener]
edit = [
  { run = 'hx "$@"', desc = "Edit in Helix", block = true, for = "unix" },
]

[open]
rules = [
  { url = "*/", use = ["edit", "open", "reveal"] },
  { mime = "text/*", use = ["edit", "reveal"] },
  { mime = "application/{json,javascript,x-yaml,toml}", use = ["edit", "reveal"] },
  { mime = "*", use = ["open", "reveal"] },
]
